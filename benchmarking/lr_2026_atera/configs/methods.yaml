methods:
  - slug: pyxenium
    display_name: pyXenium topology LR
    language: python
    status: implemented
    env_name: pyx-lr-pyxenium
    env_file: envs/pyx-lr-pyxenium.yml
    runner: runners/python/run_pyxenium.py
    default_phase: smoke
    resolution: celltype_pair
    preferred_platform: local
    a100_preferred: false
    supports_native_db: false
    supports_common_db: true
    install:
      pip_editable_repo: true

  - slug: cellchat
    display_name: CellChat v3 / Spatial CellChat
    language: r
    status: adapter-implemented
    env_name: r-lr-cellchat
    env_file: envs/r-lr-cellchat.yml
    runner: runners/r/run_cellchat.R
    default_phase: smoke
    resolution: celltype_pair
    preferred_platform: a100
    a100_preferred: true
    supports_native_db: true
    supports_common_db: true
    install:
      cran:
        - renv
        - remotes
      bioc:
        - BiocGenerics
        - Biobase
        - BiocNeighbors
        - ComplexHeatmap
      github:
        - jinworks/CellChat

