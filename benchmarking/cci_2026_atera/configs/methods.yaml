    default_phase: appendix
    resolution: cell_pair
    preferred_platform: a100
    a100_preferred: true
    supports_native_db: true
    supports_common_db: true
    install:
      source_git:
        - https://github.com/jiatingyu-amss/SCILD.git
      source_commit: 683515043df1878f3069c4dd5f887abb5c8976bd
      pythonpath: external_src/scild
      pip:
        - PyYAML>=6.0
        - numpy==1.26.4
        - scipy==1.11.4
        - zarr>=2.16,<3
        - commot==0.0.3
      docs:
        - https://scilddocs.readthedocs.io
      notes: Official implementation is source-layout based rather than a standard pip package; clone under external_src/scild and run via PYTHONPATH against Models.SCILD_main.

