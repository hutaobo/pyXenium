  - slug: cellnest
    display_name: CellNEST
    language: python
    status: adapter-implemented
    env_name: pyx-cci-cellnest
    env_file: envs/pyx-cci-cellnest.yml
    runner: scripts/run_method.py
    default_phase: smoke
    resolution: cell_pair
    preferred_platform: a100
    a100_preferred: true
    supports_native_db: true
    supports_common_db: true
    install:
      source_git:
        - https://github.com/schwartzlab-methods/CellNEST.git
      source_commit: 2737fa8f54952b4b35a540f6070655a69f2c4999
      container:
        - library://fatema/collection/cellnest_image.sif:latest
      pip:
        - PyYAML>=6.0
        - zarr>=2.16,<3
      notes: Official implementation is source-layout based; clone under external_src/cellnest and prefer Apptainer/Singularity for torch-geometric compatibility; source Python rebuild env installs pyXenium runtime deps without allowing zarr>=3.

  - slug: cellagentchat
    display_name: CellAgentChat
    language: python
    status: adapter-implemented
    env_name: pyx-cci-cellagentchat
    env_file: envs/pyx-cci-cellagentchat.yml
    runner: scripts/run_method.py
    default_phase: smoke
    resolution: cell_pair
    preferred_platform: a100
    a100_preferred: true
    supports_native_db: true
    supports_common_db: true
    install:
      source_git:
        - https://github.com/mcgilldinglab/CellAgentChat.git
      source_commit: 37e51980cb9ba87684993d8bdae26feac8806bae
      pythonpath: external_src/cellagentchat/src
      pip:
        - PyYAML>=6.0
        - numpy==1.26.4
        - zarr>=2.16,<3
        - Mesa==1.0.0
        - pyslingshot==0.0.2
      notes: Use source PYTHONPATH instead of relying on a package import name; the adapter drives tutorial modules directly; full common-db runs are split into CCI chunks and merged before final scoring; torch-scatter/torch-sparse are installed from the matching PyG wheel index.

  - slug: scild
    display_name: SCILD
    language: python
    status: adapter-implemented
    env_name: pyx-cci-scild
    env_file: envs/pyx-cci-scild.yml
